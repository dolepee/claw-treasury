services:
  - type: web
    name: claw-treasury
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: CLAW_TREASURY_DATA_DIR
        value: /var/data/claw-treasury
    disk:
      name: claw-treasury-data
      mountPath: /var/data
      sizeGB: 1
